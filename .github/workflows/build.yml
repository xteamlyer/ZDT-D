name: Build ZDT-D

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

concurrency:
  group: zdt-d-service-build
  cancel-in-progress: true

env:
  ANDROID_API_LEVEL: 36
  ANDROID_BUILD_TOOLS_VERSION: "36.0.0"
  GRADLE_VERSION: "9.5.0"
  CARGO_PROFILE: release
  CARGO_BUILD_TARGET: aarch64-linux-android
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}
  NO_DASHBOARD: "1"

permissions:
  contents: write

jobs:
  build:
    name: Build module + APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Mark build start time
        run: echo "BUILD_START_TS=$(date +%s)" >> "$GITHUB_ENV"

      - name: Read version from module.prop
        id: version
        run: |
          VERSION_CODE=$(grep -m1 '^versionCode=' module.prop | cut -d'=' -f2 | tr -d '[:space:]')
          VERSION_NAME=$(grep -m1 '^version=' module.prop | cut -d'=' -f2 | tr -d '[:space:]')

          if [[ -z "$VERSION_CODE" ]]; then
            echo "::error::versionCode dont found in module.prop"
            exit 1
          fi

          if [[ -n "$VERSION_NAME" ]]; then
            TAG="v${VERSION_NAME}-build${VERSION_CODE}"
          else
            TAG="v${VERSION_CODE}"
          fi

          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME"  >> $GITHUB_OUTPUT
          echo "tag=$TAG"                    >> $GITHUB_OUTPUT
          echo "Version: code=$VERSION_CODE name=$VERSION_NAME → tag=$TAG"

      - name: Check existing tag
        id: tag_check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "exists=true"  >> $GITHUB_OUTPUT
            echo "Tag $TAG already exist — recreate"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "New tag $TAG."
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-${{ env.ANDROID_API_LEVEL }}" \
            "build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }}"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Android NDK cross-linker
        run: |
          set -euo pipefail
          NDK_VERSION="27.2.12479018"
          sdkmanager "ndk;$NDK_VERSION"
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          NDK_BIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
          ANDROID_CC="$NDK_BIN/aarch64-linux-android21-clang"
          ANDROID_CXX="$NDK_BIN/aarch64-linux-android21-clang++"
          ANDROID_AR="$NDK_BIN/llvm-ar"
          ANDROID_RANLIB="$NDK_BIN/llvm-ranlib"

          test -x "$ANDROID_CC" || { echo "::error::Android C compiler not found: $ANDROID_CC"; exit 1; }
          test -x "$ANDROID_CXX" || { echo "::error::Android C++ compiler not found: $ANDROID_CXX"; exit 1; }
          test -x "$ANDROID_AR" || { echo "::error::Android archiver not found: $ANDROID_AR"; exit 1; }
          test -x "$ANDROID_RANLIB" || { echo "::error::Android ranlib not found: $ANDROID_RANLIB"; exit 1; }

          {
            echo "NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_HOME=$NDK_ROOT"
            echo "PATH=$NDK_BIN:$PATH"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ANDROID_CC"
            echo "CC_aarch64_linux_android=$ANDROID_CC"
            echo "CXX_aarch64_linux_android=$ANDROID_CXX"
            echo "AR_aarch64_linux_android=$ANDROID_AR"
            echo "RANLIB_aarch64_linux_android=$ANDROID_RANLIB"
          } >> "$GITHUB_ENV"

          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<EOF
          [target.aarch64-linux-android]
          linker = "$ANDROID_CC"
          ar = "$ANDROID_AR"
          EOF

      - name: Verify Android Rust cross toolchain
        run: |
          set -euo pipefail
          echo "NDK_ROOT=$NDK_ROOT"
          echo "CC_aarch64_linux_android=$CC_aarch64_linux_android"
          echo "AR_aarch64_linux_android=$AR_aarch64_linux_android"
          "$CC_aarch64_linux_android" --version | head -1
          "$AR_aarch64_linux_android" --version | head -1
          rustc --print target-list | grep -qx '${{ env.CARGO_BUILD_TARGET }}'
          cargo -V
          rustc -V

      - name: Setup Gradle ${{ env.GRADLE_VERSION }}
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: Cache Cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-aarch64-linux-android-${{ hashFiles('rust/**/Cargo.lock') }}
          restore-keys: |
            cargo-aarch64-linux-android-

      - name: Check prebuilt binaries
        run: |
          PREBUILT="prebuilt/bin/arm64-v8a"

          if [[ ! -d "$PREBUILT" ]]; then
            echo "::error::Directory $PREBUILT does not exist"
            exit 1
          fi

          # Count all regular files in the directory
          COUNT=$(find "$PREBUILT" -maxdepth 1 -type f | wc -l)
          if [[ "$COUNT" -eq 0 ]]; then
            echo "::error::No binaries found in $PREBUILT"
            exit 1
          fi

          echo "Found $COUNT prebuilt binaries:"
          find "$PREBUILT" -maxdepth 1 -type f -printf '  %f\n' | sort

      - name: Build zdtd (Rust, aarch64-linux-android)
        working-directory: rust/zdtd
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/rust/target
          RUSTUP_HOME: ""
          RUSTUP_TOOLCHAIN: ""
          RUSTFLAGS: ""
          CARGO_ENCODED_RUSTFLAGS: ""
          RUSTC_WRAPPER: ""
        run: cargo build --profile ${{ env.CARGO_PROFILE }} --target ${{ env.CARGO_BUILD_TARGET }}

      - name: Build t2s (Rust, aarch64-linux-android)
        working-directory: rust/T2s
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/rust/target
          RUSTUP_HOME: ""
          RUSTUP_TOOLCHAIN: ""
          RUSTFLAGS: ""
          CARGO_ENCODED_RUSTFLAGS: ""
          RUSTC_WRAPPER: ""
        run: cargo build --profile ${{ env.CARGO_PROFILE }} --target ${{ env.CARGO_BUILD_TARGET }}

      - name: Build Zygisk (arm64-v8a)
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_ROOT: ${{ env.NDK_ROOT }}
          NDK_ROOT: ${{ env.NDK_ROOT }}
          ANDROID_API_LEVEL: 24
        run: |
          set -euo pipefail
          mkdir -p out/zygisk
          ./zygisk/build.sh out/zygisk/arm64-v8a.so
          file out/zygisk/arm64-v8a.so
          test -s out/zygisk/arm64-v8a.so
          readelf -Ws out/zygisk/arm64-v8a.so | grep -q ' zygisk_module_entry$'
          if readelf -d out/zygisk/arm64-v8a.so | grep -E 'NEEDED.*(libc\+\+|libstdc\+\+)' >/dev/null 2>&1; then
            echo "::error::Zygisk binary must not depend on C++ STL runtime"
            exit 1
          fi

      - name: Pack Magisk module (zdt_module.zip)
        run: |
          set -euo pipefail

          MODULE_BUILD_DIR="out/module_build/module_root"
          MODULE_ZIP="out/module/zdt_module.zip"
          PREBUILT="prebuilt/bin/arm64-v8a"
          CARGO_OUT="rust/target/${{ env.CARGO_BUILD_TARGET }}/${{ env.CARGO_PROFILE }}"

          rm -rf out/module_build
          mkdir -p "$MODULE_BUILD_DIR" out/module

          cp -a module_template/. "$MODULE_BUILD_DIR/"
          cp -f module.prop "$MODULE_BUILD_DIR/module.prop"

          [[ -d "$MODULE_BUILD_DIR/META-INF" ]] || { echo "::error::META-INF doesnt exist in module_template"; exit 1; }
          find "$MODULE_BUILD_DIR" -name .gitkeep -type f -delete 2>/dev/null || true
          rm -f "$MODULE_BUILD_DIR/zygisk/unloaded" 2>/dev/null || true

          mkdir -p "$MODULE_BUILD_DIR/bin" "$MODULE_BUILD_DIR/zygisk"
          cp -f "out/zygisk/arm64-v8a.so" "$MODULE_BUILD_DIR/zygisk/arm64-v8a.so" && chmod 644 "$MODULE_BUILD_DIR/zygisk/arm64-v8a.so"

          cp -f "$CARGO_OUT/zdtd" "$MODULE_BUILD_DIR/bin/zdtd" && chmod 755 "$MODULE_BUILD_DIR/bin/zdtd"
          cp -f "$CARGO_OUT/t2s"  "$MODULE_BUILD_DIR/bin/t2s"  && chmod 755 "$MODULE_BUILD_DIR/bin/t2s"

          # Copy all prebuilt binaries dynamically instead of a hardcoded list
          while IFS= read -r -d '' bin_path; do
            bin_name=$(basename "$bin_path")
            cp -f "$bin_path" "$MODULE_BUILD_DIR/bin/$bin_name"
            chmod 755 "$MODULE_BUILD_DIR/bin/$bin_name"
            echo "  + $bin_name"
          done < <(find "$PREBUILT" -maxdepth 1 -type f -print0 | sort -z)

          pushd "$MODULE_BUILD_DIR" > /dev/null
          zip -qr "../../../$MODULE_ZIP" .
          popd > /dev/null

          unzip -l "$MODULE_ZIP" | grep -q 'zygisk/arm64-v8a.so' || { echo "::error::Zygisk binary missing in module zip"; exit 1; }
          if unzip -l "$MODULE_ZIP" | grep -qE '(^|/)(unloaded|\.gitkeep)$'; then
            echo "::error::unloaded or .gitkeep leaked into module zip"
            exit 1
          fi

          echo "MODULE_ZIP=$MODULE_ZIP" >> $GITHUB_ENV

      - name: Locate Android project root
        run: |
          SETTINGS=$(find . -maxdepth 4 \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) \
            | grep -v '/build/' | sort | head -1)
          if [[ -z "$SETTINGS" ]]; then
            echo "::error::settings.gradle dont found:"
            find . -maxdepth 4 -name '*.gradle*' | sort
            exit 1
          fi
          GRADLE_PROJECT_DIR=$(dirname "$SETTINGS")
          echo "GRADLE_PROJECT_DIR=$GRADLE_PROJECT_DIR" >> $GITHUB_ENV
          echo "Android project root: $GRADLE_PROJECT_DIR"

      - name: Write local.properties & keystore config
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$GRADLE_PROJECT_DIR/local.properties"

          KEYSTORE_PATH="$(pwd)/keystores/zdt-debug.keystore"
          mkdir -p "$(dirname "$KEYSTORE_PATH")"

          if [[ ! -f "$KEYSTORE_PATH" ]]; then
            keytool -genkeypair \
              -keystore "$KEYSTORE_PATH" \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" \
              > /dev/null 2>&1
          fi

          {
            echo "storeFile=$KEYSTORE_PATH"
            echo "storePassword=android"
            echo "keyAlias=androiddebugkey"
            echo "keyPassword=android"
          } > "$GRADLE_PROJECT_DIR/keystore.properties"

      - name: Build APK (assemble${{ env.BUILD_TYPE }})
        working-directory: ${{ env.GRADLE_PROJECT_DIR }}
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
        run: |
          gradle \
            --no-daemon \
            --max-workers=$(nproc) \
            "assemble${{ env.BUILD_TYPE }}"

      - name: Collect final artifacts
        run: |
          mkdir -p out/dist

          APK=$(find "$GRADLE_PROJECT_DIR" -path '*/build/outputs/apk/*.apk' | sort | tail -1)
          [[ -n "$APK" ]] || { echo "::error::APK does not exist"; exit 1; }

          cp -f "$APK"        out/dist/app-release.apk
          cp -f "$MODULE_ZIP" out/dist/zdt_module.zip

          ls -lh out/dist/

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          path: out/dist/app-release.apk
          retention-days: 30
          archive: false

      - name: Publish service release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          SERVICE_TAG="service-build"
          SERVICE_TITLE="ZDT-D Service Build"
          APK_SOURCE="out/dist/app-release.apk"
          APK_RELEASE="out/dist/ZDT-D-service-build.apk"

          test -s "$APK_SOURCE" || { echo "::error::APK does not exist: $APK_SOURCE"; exit 1; }
          cp -f "$APK_SOURCE" "$APK_RELEASE"

          BUILD_END_TS="$(date +%s)"
          BUILD_START_TS="${BUILD_START_TS:-$BUILD_END_TS}"
          BUILD_DURATION_SEC=$((BUILD_END_TS - BUILD_START_TS))
          BUILD_DURATION="$(printf '%02d:%02d:%02d' $((BUILD_DURATION_SEC / 3600)) $(((BUILD_DURATION_SEC % 3600) / 60)) $((BUILD_DURATION_SEC % 60)))"

          BUILD_TIME_UTC="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          APK_SIZE_BYTES="$(stat -c%s "$APK_RELEASE")"
          APK_SIZE_HUMAN="$(numfmt --to=iec --suffix=B --format='%.2f' "$APK_SIZE_BYTES")"

          FULL_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          REPO_URL="https://github.com/${{ github.repository }}"
          RUN_URL="${REPO_URL}/actions/runs/${{ github.run_id }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          BUILD_TYPE="${{ env.BUILD_TYPE }}"

          if [[ -z "$VERSION_NAME" ]]; then
            VERSION_NAME="unknown"
          fi

          PREV_SHA=""
          if git ls-remote --exit-code --tags origin "refs/tags/${SERVICE_TAG}" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/${SERVICE_TAG}:refs/tags/${SERVICE_TAG}"
            PREV_SHA="$(git rev-list -n 1 "$SERVICE_TAG" 2>/dev/null || true)"
          fi

          if [[ -n "$PREV_SHA" && "$PREV_SHA" != "$FULL_SHA" ]]; then
            COMPARE_URL="${REPO_URL}/compare/${PREV_SHA}...${FULL_SHA}"
            TOTAL_COMMITS="$(git rev-list --count "${PREV_SHA}..${FULL_SHA}" 2>/dev/null || echo 0)"
            CHANGELOG="$(git log --no-merges --pretty=format:'- %s (`%h`)' -n 30 "${PREV_SHA}..${FULL_SHA}" || true)"
            if [[ -z "$CHANGELOG" ]]; then
              CHANGELOG="- No commit messages found for this range."
            fi
            if [[ "$TOTAL_COMMITS" =~ ^[0-9]+$ && "$TOTAL_COMMITS" -gt 30 ]]; then
              CHANGELOG="${CHANGELOG}"$'\n'"- ...and $((TOTAL_COMMITS - 30)) more commits."
            fi
          elif [[ -n "$PREV_SHA" && "$PREV_SHA" == "$FULL_SHA" ]]; then
            COMPARE_URL="${REPO_URL}/commit/${FULL_SHA}"
            CHANGELOG="- No source changes since the previous service build."
          else
            COMPARE_URL="${REPO_URL}/commit/${FULL_SHA}"
            CHANGELOG="- Initial service build for this technical release."
          fi

          cat > release_notes.md <<EOF
          # ZDT-D Service Build

          This is an automatically generated technical build produced by GitHub Actions.

          The post is updated after every successful workflow run and always reflects the latest service build from the repository.

          ## Build information

          | Field | Value |
          | --- | --- |
          | Version | ${VERSION_NAME} |
          | Version code | ${VERSION_CODE} |
          | Build type | ${BUILD_TYPE} |
          | Commit | [\`${SHORT_SHA}\`](${REPO_URL}/commit/${FULL_SHA}) |
          | Last build time | ${BUILD_TIME_UTC} |
          | Build duration | ${BUILD_DURATION} |
          | APK size | ${APK_SIZE_HUMAN} |
          | Workflow run | [#${{ github.run_number }}](${RUN_URL}) |

          ## Changes

          [Compare changes](${COMPARE_URL})

          ### Commit list

          ${CHANGELOG}

          ## Installation notice

          This APK is signed by the GitHub Actions build environment and can have a different signature than the APK from the main public release.

          Because of the different signature, Android may block installation over an already installed release build.

          To install this service build, first remove the ZDT-D application installed from the main release, then install the APK attached to this service build.

          The module itself is installed and updated from inside the application by the universal installer for Magisk, KernelSU, APatch, and compatible managers.
          EOF

          sed -i 's/^          //' release_notes.md

          echo "===== Service release notes ====="
          cat release_notes.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$SERVICE_TAG" "$FULL_SHA"
          git push -f origin "refs/tags/${SERVICE_TAG}"

          if gh release view "$SERVICE_TAG" >/dev/null 2>&1; then
            gh release edit "$SERVICE_TAG" --title "$SERVICE_TITLE" --notes-file release_notes.md --prerelease
          else
            gh release create "$SERVICE_TAG" --target "$FULL_SHA" --title "$SERVICE_TITLE" --notes-file release_notes.md --prerelease --latest=false
          fi

          gh release upload "$SERVICE_TAG" "$APK_RELEASE" --clobber
